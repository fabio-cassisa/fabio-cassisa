<svg width="820" height="570" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .term-bg { fill: #0d1117; }
      .term-bar { fill: #161b22; }
      .dot-red { fill: #ff5f56; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #27c93f; }
      .term-title { fill: #8b949e; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace; font-size: 12px; }
      .label { fill: #58a6ff; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace; font-size: 12px; font-weight: 700; }
      .value { fill: #c9d1d9; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace; font-size: 12px; }
      .user { fill: #7ee787; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace; font-size: 12px; font-weight: 700; }
      .separator { fill: #6e7681; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace; font-size: 12px; }
      .prompt { fill: #7ee787; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace; font-size: 12px; }
      .command { fill: #f0f6fc; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace; font-size: 12px; }
      .cursor { fill: #f0f6fc; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace; font-size: 12px; }
      .dim { fill: #484f58; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace; font-size: 12px; }

      /* DAGAS ASCII color cycle through the palette */
      @keyframes color-cycle {
        0%, 100%  { fill: #58a6ff; }
        14%       { fill: #ff5f56; }
        28%       { fill: #27c93f; }
        42%       { fill: #ffbd2e; }
        57%       { fill: #bc8cff; }
        71%       { fill: #39c5cf; }
        85%       { fill: #c9d1d9; }
      }

      .ascii {
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace;
        font-size: 11.5px;
        font-weight: 700;
        animation: color-cycle 16s ease-in-out infinite;
      }

      /* Blinking cursor */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .blink { animation: blink 1.2s step-end infinite; }

      /* Subtle glow on active palette color */
      @keyframes glow-1 { 0%, 10%, 100% { opacity: 1; } 14% { opacity: 1; filter: brightness(1.5); } 18% { opacity: 1; } }
      @keyframes glow-2 { 0%, 24%, 100% { opacity: 1; } 28% { opacity: 1; filter: brightness(1.5); } 32% { opacity: 1; } }
      @keyframes glow-3 { 0%, 38%, 100% { opacity: 1; } 42% { opacity: 1; filter: brightness(1.5); } 46% { opacity: 1; } }
      @keyframes glow-4 { 0%, 53%, 100% { opacity: 1; } 57% { opacity: 1; filter: brightness(1.5); } 61% { opacity: 1; } }
      @keyframes glow-5 { 0%, 67%, 100% { opacity: 1; } 71% { opacity: 1; filter: brightness(1.5); } 75% { opacity: 1; } }
      @keyframes glow-6 { 0%, 81%, 100% { opacity: 1; } 85% { opacity: 1; filter: brightness(1.5); } 89% { opacity: 1; } }

      .pal-1 { animation: glow-1 16s ease-in-out infinite; }
      .pal-2 { animation: glow-2 16s ease-in-out infinite; }
      .pal-3 { animation: glow-3 16s ease-in-out infinite; }
      .pal-4 { animation: glow-4 16s ease-in-out infinite; }
      .pal-5 { animation: glow-5 16s ease-in-out infinite; }
      .pal-6 { animation: glow-6 16s ease-in-out infinite; }

      .palette-0 { fill: #0d1117; }
      .palette-1 { fill: #ff5f56; }
      .palette-2 { fill: #27c93f; }
      .palette-3 { fill: #ffbd2e; }
      .palette-4 { fill: #58a6ff; }
      .palette-5 { fill: #bc8cff; }
      .palette-6 { fill: #39c5cf; }
      .palette-7 { fill: #c9d1d9; }
    </style>
  </defs>

  <!-- Window -->
  <rect class="term-bg" width="820" height="570" rx="10" />
  
  <!-- Title bar -->
  <rect class="term-bar" width="820" height="36" rx="10" />
  <rect class="term-bar" x="0" y="26" width="820" height="10" />
  
  <!-- Window dots -->
  <circle class="dot-red" cx="20" cy="18" r="6" />
  <circle class="dot-yellow" cx="40" cy="18" r="6" />
  <circle class="dot-green" cx="60" cy="18" r="6" />
  
  <!-- Title -->
  <text class="term-title" x="410" y="22" text-anchor="middle">dagas@world: ~</text>

  <!-- Prompt line -->
  <text class="prompt" x="20" y="64">вқҜ</text>
  <text class="command" x="36" y="64">neofetch</text>

  <!-- ASCII Art - DAGAS (bold block style, color cycling) -->
  <text class="ascii" x="20" y="94"> в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—</text>
  <text class="ascii" x="20" y="108"> в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ</text>
  <text class="ascii" x="20" y="122"> в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—</text>
  <text class="ascii" x="20" y="136"> в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘</text>
  <text class="ascii" x="20" y="150"> в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘</text>
  <text class="ascii" x="20" y="164"> в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қ</text>

  <!-- Neofetch info - right side -->
  <text class="user" x="400" y="94">dagas@world</text>
  <text class="separator" x="400" y="110">-----------</text>

  <text class="label" x="400" y="132">os</text>
  <text class="value" x="500" y="132">creative technologist</text>

  <text class="label" x="400" y="148">location</text>
  <text class="value" x="500" y="148">torino В· malmГ¶ В· kГёbenhavn</text>

  <text class="label" x="400" y="164">company</text>
  <text class="value" x="500" y="164">adnami вҖ” high-impact ad formats</text>

  <!-- Separator -->
  <line x1="20" y1="184" x2="800" y2="184" stroke="#21262d" stroke-width="1" />

  <!-- Stack info -->
