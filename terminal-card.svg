  <text class="value" x="140" y="210">typescript В· javascript В· python В· bash В· sql В· html В· css</text>

  <text class="label" x="20" y="232">frontend</text>
  <text class="value" x="140" y="232">react В· next.js В· svelte В· astro В· gsap В· three.js В· tailwind</text>

  <text class="label" x="20" y="254">backend</text>
  <text class="value" x="140" y="254">node.js В· supabase В· postgresql В· rest apis В· vector databases</text>

  <text class="label" x="20" y="276">infra</text>
  <text class="value" x="140" y="276">vercel В· netlify В· azure devops В· github actions В· vite</text>

  <text class="label" x="20" y="298">ai / web3</text>
  <text class="value" x="140" y="298">llm tooling В· mcp В· ai agents В· embeddings В· solidity</text>

  <text class="label" x="20" y="320">design</text>
  <text class="value" x="140" y="320">figma В· adobe cc В· after effects В· blender В· affinity В· rhino</text>

  <text class="label" x="20" y="342">hardware</text>
  <text class="value" x="140" y="342">raspberry pi В· flipper zero В· arduino В· micro:bit</text>

  <text class="dim" x="20" y="364">past lives</text>
  <text class="dim" x="140" y="364">c# В· c++ В· php В· wordpress В· d3.js В· glsl</text>

  <!-- Separator -->
  <line x1="20" y1="384" x2="800" y2="384" stroke="#21262d" stroke-width="1" />

  <text class="label" x="20" y="410">exploring</text>
  <text class="value" x="140" y="410">on-chain agents В· defi В· rust В· go В· pkm systems</text>

  <text class="label" x="20" y="432">philosophy</text>
  <text class="value" x="140" y="432">build > talk В· automate everything В· aesthetics matter</text>

  <!-- Color palette bar with sync glow -->
  <rect class="palette-0" x="20" y="462" width="30" height="14" rx="2" stroke="#21262d" stroke-width="1" />
  <rect class="palette-1 pal-1" x="54" y="462" width="30" height="14" rx="2" />
  <rect class="palette-2 pal-2" x="88" y="462" width="30" height="14" rx="2" />
  <rect class="palette-3 pal-3" x="122" y="462" width="30" height="14" rx="2" />
  <rect class="palette-4" x="156" y="462" width="30" height="14" rx="2" />
  <rect class="palette-5 pal-4" x="190" y="462" width="30" height="14" rx="2" />
  <rect class="palette-6 pal-5" x="224" y="462" width="30" height="14" rx="2" />
  <rect class="palette-7 pal-6" x="258" y="462" width="30" height="14" rx="2" />

  <!-- Bottom prompt with blinking cursor -->
  <text class="prompt" x="20" y="510">вқҜ</text>
  <text class="cursor blink" x="36" y="510">в–Ҳ</text>

</svg>